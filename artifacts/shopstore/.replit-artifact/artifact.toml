kind = "web"
previewPath = "/"
title = "DN Design Store"
version = "1.0.0"
id = "artifacts/shopstore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24606

[services.development]
run = "pnpm --filter @workspace/shopstore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shopstore", "run", "build" ]
publicDir = "artifacts/shopstore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24606"
BASE_PATH = "/"
